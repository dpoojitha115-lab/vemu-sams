<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - EduTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/login.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="particles" id="particles"></div>
  <div class="login-wrapper" style="max-width:900px">
    <div class="left-panel">
      <div class="hero-text">
        <h1>Reset Your<br/><em>Password</em></h1>
        <p>Choose a new password for your account and continue back to the attendance portal.</p>
      </div>
    </div>
    <div class="right-panel">
      <div class="login-card">
        <div class="login-header">
          <h2>Create New Password</h2>
          <p>Use the reset link generated from the login page</p>
        </div>
        <form class="login-form" id="resetForm">
          <div class="form-group">
            <label>
              <span class="label-text">New Password</span>
              <div class="input-wrap">
                <input type="password" id="newPassword" placeholder="Enter new password" required />
              </div>
            </label>
          </div>
          <div class="form-group">
            <label>
              <span class="label-text">Confirm Password</span>
              <div class="input-wrap">
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required />
              </div>
            </label>
          </div>
          <button type="submit" class="login-btn" id="resetBtn">
            <span class="btn-text">Update Password</span>
            <span class="btn-loader" style="display:none">Saving...</span>
            <span class="btn-arrow">→</span>
          </button>
          <div class="error-msg" id="resetMsg"></div>
        </form>
      </div>
    </div>
  </div>
  <script>
    (function initParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 24; i += 1) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 3 + 1;
        p.style.cssText = "width:" + size + "px;height:" + size + "px;left:" + (Math.random() * 100) + "%;bottom:" + (Math.random() * 20) + "%;animation-duration:" + (Math.random() * 15 + 10) + "s;animation-delay:" + (Math.random() * 10) + "s;";
        container.appendChild(p);
      }
    })();

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const messageEl = document.getElementById('resetMsg');
    const btn = document.getElementById('resetBtn');

    function showMessage(message, success) {
      messageEl.textContent = message;
      messageEl.classList.add('show');
      messageEl.style.color = success ? '#27ae60' : '';
    }

    if (!token) {
      showMessage('Reset token is missing. Please request a new reset link.', false);
      btn.disabled = true;
    }

    document.getElementById('resetForm').addEventListener('submit', async function (event) {
      event.preventDefault();
      const password = document.getElementById('newPassword').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();

      if (password.length < 6) {
        showMessage('Password must be at least 6 characters long.', false);
        return;
      }
      if (password !== confirmPassword) {
        showMessage('Passwords do not match.', false);
        return;
      }

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const result = await response.json();
        if (!response.ok || !result.success) {
          throw new Error(result.error || 'Unable to reset password.');
        }
        showMessage('Password updated successfully. Redirecting to login...', true);
        setTimeout(function () {
          window.location.href = '/';
        }, 1500);
      } catch (error) {
        showMessage(error.message || 'Unable to reset password.', false);
      }
    });
  </script>
</body>
</html>
