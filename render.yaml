services:
  - type: web
    name: vemu-sams-backend
    env: node
    rootDir: .
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: CLIENT_URLS
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: PORT
        value: 10000
